<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="받아쓰기" />
<meta name="theme-color" content="#fafafa" />
<link rel="manifest" href="/manifest.json" />
<title>받아쓰기 연습</title>
<style>
  /* Nintendo Y2K design tokens (see DESIGN.md) */
  :root {
    --canvas: #7a8aba;
    --periwinkle: #8ba1d4;
    --sky: #9fbee7;
    --lavender: #acace7;
    --platinum: #dedede;
    --surface: #ffffff;
    --chrome-indigo: #3d4f97;
    --muted-indigo: #60619c;
    --carbon: #21242e;
    --ink: #21242e;
    --ink-soft: #3d4f97;
    --signal: #f68d1f;
    --amber: #ecab37;
    --nav-gold: #e48600;
    --primary: #e60012;
    --on-primary: #ffffff;
    --error: #e60012;

    --r-none: 0px;
    --r-xs: 2px;
    --r-sm: 4px;
    --r-md: 6px;
    --r-lg: 10px;
    --r-full: 9999px;

    --sans: Arial, Helvetica, -apple-system, system-ui, sans-serif;
    --mono: "Courier New", monospace;
  }
  * { box-sizing: border-box; }
  [hidden] { display: none !important; }
  .tabs:empty, .grouptitle:empty { display: none; }
  body {
    margin: 0 auto;
    max-width: 830px;
    padding: 16px 12px 64px;
    font-family: var(--sans);
    background: var(--canvas);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  /* Hero — beveled plate with outlined display wordmark */
  .hero {
    position: relative;
    overflow: hidden;
    margin-bottom: 16px;
    padding: 24px 20px 20px;
    background: var(--periwinkle);
    border-radius: var(--r-md);
    border-top: 2px solid rgba(255, 255, 255, 0.4);
    border-left: 2px solid rgba(255, 255, 255, 0.3);
    border-right: 2px solid var(--chrome-indigo);
    border-bottom: 2px solid var(--chrome-indigo);
    box-shadow: inset 1px 1px 0 rgba(255, 255, 255, 0.2), inset -1px -1px 0 rgba(0, 0, 0, 0.1);
  }
  .eyebrow {
    margin: 0 0 8px;
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  h1 {
    margin: 0;
    color: var(--surface);
    font-weight: 900;
    line-height: 1;
    font-size: 32px;
    letter-spacing: 0;
    text-shadow: 2px 2px 0 rgba(0, 0, 0, 0.3), -1px -1px 0 rgba(0, 0, 0, 0.2);
    -webkit-text-stroke: 1.5px var(--ink);
  }

  /* Primary CTA = signal orange beveled chip */
  .pick {
    display: block;
    width: 100%;
    padding: 14px 16px;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--on-primary);
    background: var(--signal);
    border: none;
    border-radius: var(--r-xs);
    border-top: 2px solid rgba(255, 255, 255, 0.3);
    border-left: 2px solid rgba(255, 255, 255, 0.2);
    border-right: 2px solid rgba(0, 0, 0, 0.2);
    border-bottom: 2px solid rgba(0, 0, 0, 0.3);
    cursor: pointer;
  }
  .pick:disabled { opacity: 0.5; }

  .status {
    min-height: 20px;
    padding: 12px 8px;
    color: var(--ink-soft);
    font-size: 12px;
    font-weight: 500;
  }
  .spin {
    display: inline-block;
    width: 14px;
    height: 14px;
    margin-right: 8px;
    vertical-align: -2px;
    border: 2px solid rgba(0, 0, 0, 0.1);
    border-top-color: var(--ink);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Controls = beveled plate */
  .controls {
    display: grid;
    gap: 12px;
    margin: 16px 0;
    padding: 16px;
    background: var(--periwinkle);
    border-radius: var(--r-md);
    border-top: 2px solid rgba(255, 255, 255, 0.3);
    border-left: 2px solid rgba(255, 255, 255, 0.2);
    border-right: 2px solid var(--chrome-indigo);
    border-bottom: 2px solid var(--chrome-indigo);
    box-shadow: inset 1px 1px 0 rgba(255, 255, 255, 0.15), inset -1px -1px 0 rgba(0, 0, 0, 0.1);
  }
  .row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .row label {
    flex: 0 0 80px;
    color: var(--ink);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .row input[type=range] {
    flex: 1;
    accent-color: var(--signal);
  }
  .row input[type=checkbox] {
    width: 16px;
    height: 16px;
    accent-color: var(--signal);
    cursor: pointer;
  }
  .row select {
    flex: 1;
    padding: 8px 8px;
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 500;
    color: var(--ink);
    background: var(--sky);
    border: 1px solid var(--chrome-indigo);
    border-radius: var(--r-xs);
  }
  .row .val {
    flex: 0 0 48px;
    text-align: right;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-soft);
    font-weight: 500;
  }

  /* In-app action buttons = carbon slabs */
  .actions {
    display: flex;
    gap: 8px;
  }
  .actions button {
    flex: 1;
    padding: 10px 12px;
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    border-radius: var(--r-none);
    cursor: pointer;
  }
  .btn-primary {
    background: var(--carbon);
    color: var(--on-primary);
    border: none;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
  }
  .btn-ghost {
    background: var(--sky);
    color: var(--ink);
    border: 1px solid var(--chrome-indigo);
    border-top: 2px solid rgba(255, 255, 255, 0.2);
  }
  .actions button:disabled { opacity: 0.5; }

  /* Tabs = category chips */
  .tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin: 16px 0 8px;
  }
  .tabs button {
    padding: 8px 14px;
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--ink);
    background: var(--sky);
    border: 1px solid var(--chrome-indigo);
    border-top: 2px solid rgba(255, 255, 255, 0.2);
    border-radius: var(--r-xs);
    cursor: pointer;
  }
  .tabs button.on {
    background: var(--signal);
    color: var(--on-primary);
    border-color: var(--signal);
  }

  .grouptitle {
    margin: 8px 0 4px;
    color: var(--ink);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  /* Card = beveled plate with platinum row surface */
  .card {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 8px 0;
    padding: 12px;
    background: var(--platinum);
    border-radius: var(--r-sm);
    border-top: 1px solid rgba(255, 255, 255, 0.4);
    border-left: 1px solid rgba(255, 255, 255, 0.3);
    border-right: 1px solid var(--chrome-indigo);
    border-bottom: 1px solid var(--chrome-indigo);
  }
  .card.active {
    background: var(--sky);
    border-color: var(--signal);
  }
  /* Number circle */
  .num {
    flex: 0 0 32px;
    height: 32px;
    border-radius: var(--r-full);
    background: var(--surface);
    color: var(--ink);
    border: 1px solid var(--chrome-indigo);
    display: grid;
    place-items: center;
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 700;
  }
  .txt {
    flex: 1;
    color: var(--ink);
    font-size: 12px;
    line-height: 1.4;
    font-weight: 400;
  }
  /* Hidden answer = tap to reveal */
  .txt.hidden {
    position: relative;
    min-height: 32px;
    color: transparent;
    user-select: none;
    cursor: pointer;
    background: var(--lavender);
    border: 1px dashed var(--muted-indigo);
    border-radius: var(--r-xs);
    padding: 4px 8px;
  }
  .txt.hidden::after {
    content: "눌러서 정답 확인";
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    color: var(--ink-soft);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .play {
    flex: 0 0 auto;
    width: 32px;
    height: 32px;
    font-size: 14px;
    color: var(--on-primary);
    background: var(--signal);
    border: none;
    border-radius: var(--r-full);
    cursor: pointer;
    font-weight: 700;
  }

  /* Layout: left sidebar (saved sets) + main column */
  .layout {
    display: flex;
    gap: 16px;
    align-items: flex-start;
    justify-content: center;
  }
  .main {
    width: 100%;
    max-width: 640px;
    min-width: 0;
  }
  .sidebar {
    flex: 0 0 200px;
    position: sticky;
    top: 16px;
  }
  .sidebar h2 {
    margin: 0 0 12px;
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--ink);
  }
  .sidebar button {
    display: block;
    width: 100%;
    margin: 6px 0;
    padding: 10px 12px;
    text-align: left;
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 500;
    color: var(--ink);
    background: var(--sky);
    border: 1px solid var(--chrome-indigo);
    border-top: 2px solid rgba(255, 255, 255, 0.2);
    border-radius: var(--r-sm);
    cursor: pointer;
  }
  @media (max-width: 820px) {
    .layout {
      flex-direction: column;
      align-items: stretch;
    }
    .sidebar {
      position: static;
      flex: 0 0 auto;
    }
  }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="savedWrap" hidden>
    <h2>저장된 세트</h2>
    <div id="saved"></div>
  </aside>
  <main class="main">
<div class="hero">
  <p class="eyebrow">Dictation · 받아쓰기</p>
  <h1>오늘의 받아쓰기</h1>
</div>

<button class="pick" id="pickBtn">문제지 사진 찍기 / 고르기</button>
<input type="file" id="file" accept="image/*" capture="environment" hidden />

<div class="status" id="status"></div>

<div class="controls" id="controls" hidden>
  <div class="row"><label>읽기 속도</label>
    <input type="range" id="rate" min="0.5" max="1.2" step="0.1" value="0.8" />
    <span class="val" id="rateV">0.8x</span></div>
  <div class="row"><label>반복 횟수</label>
    <input type="range" id="rep" min="1" max="3" step="1" value="2" />
    <span class="val" id="repV">2회</span></div>
  <div class="row"><label>쓰기 간격</label>
    <input type="range" id="gap" min="2" max="10" step="1" value="5" />
    <span class="val" id="gapV">5초</span></div>
  <div class="row"><label>음성</label>
    <select id="voice"></select></div>
  <div class="row"><label>정답 보기</label>
    <input type="checkbox" id="reveal" /></div>
  <div class="actions">
    <button class="btn-primary" id="playAll">▶ 이 급수 자동재생</button>
    <button class="btn-ghost" id="stop">■ 정지</button>
    <button class="btn-ghost" id="save">저장</button>
  </div>
</div>

<div class="tabs" id="tabs"></div>
<div class="grouptitle" id="groupTitle"></div>
<div id="list"></div>
  </main>
</div>

<script>
const $ = (id) => document.getElementById(id);
let groups = [];      // [{title, problems:[{number,text}]}]
let current = 0;      // selected group index
let stopped = false;
const curProblems = () => (groups[current]?.problems ?? []);

// ---- TTS (browser-native, offline Korean voice) ----
let voices = [];
// Rank Korean voices by quality. The low-quality "compact"/novelty voices are
// what sound like a foreigner reading Korean.
const koScore = (v) => {
  const n = v.name.toLowerCase();
  if (/premium|enhanced|neural|natural|siri/.test(n)) return 4; // Yuna (Enhanced), Siri — best
  if (n.includes("google")) return 3;                           // Chrome network voice, quite good
  if (n.includes("yuna")) return 2;                             // macOS default, decent
  // macOS novelty/character voices read Korean awkwardly — avoid.
  if (/eddy|flo|grandma|grandpa|reed|rocko|sandy|shelley|compact|eloquence/.test(n)) return 0;
  return 1;
};
// Korean voices, best first.
const koVoices = () =>
  voices.filter((v) => v.lang && v.lang.toLowerCase().startsWith("ko"))
        .sort((a, b) => koScore(b) - koScore(a));

const loadVoices = () => { voices = speechSynthesis.getVoices(); fillVoiceMenu(); };
speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

// Populate the dropdown; default to the best-scored voice (unless user already chose).
function fillVoiceMenu() {
  const sel = $("voice"), ko = koVoices();
  if (!ko.length) return;
  const chosen = sel.value;
  sel.innerHTML = ko.map((v) => `<option value="${v.name}">${v.name}</option>`).join("");
  sel.value = ko.some((v) => v.name === chosen) ? chosen : ko[0].name; // ko[0] = best pick
}

function speak(text, rate) {
  return new Promise((res) => {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "ko-KR"; u.rate = rate;
    const ko = koVoices();
    const v = ko.find((x) => x.name === $("voice").value) || ko[0];
    if (v) u.voice = v;
    u.onend = res; u.onerror = res;
    speechSynthesis.speak(u);
  });
}
const wait = (ms) => new Promise((r) => setTimeout(r, ms));

// Read once problem: N repeats with a writing gap between them.
async function readProblem(text) {
  const rate = +$("rate").value, reps = +$("rep").value, gap = +$("gap").value * 1000;
  for (let i = 0; i < reps && !stopped; i++) {
    await speak(text, rate);
    if (i < reps - 1 && !stopped) await wait(gap);
  }
}

function stop() { stopped = true; speechSynthesis.cancel(); setActive(-1); }

// ---- rendering ----
function setActive(idx) {
  [...$("list").children].forEach((el, i) => el.classList.toggle("active", i === idx));
}

function renderTabs() {
  $("tabs").innerHTML = "";
  groups.forEach((g, i) => {
    const b = document.createElement("button");
    // label = leading token of the title (e.g. "1급"), else the full title
    b.textContent = g.title.split(/[·.\s]/)[0] || `${i + 1}`;
    b.className = i === current ? "on" : "";
    b.onclick = () => { stop(); current = i; render(); };
    $("tabs").appendChild(b);
  });
}

function render() {
  const revealed = $("reveal").checked;
  const problems = curProblems();
  renderTabs();
  $("groupTitle").textContent = groups[current]?.title ?? "";
  $("list").innerHTML = "";
  problems.forEach((p, i) => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML =
      `<div class="num">${p.number}</div>` +
      `<div class="txt ${revealed ? "" : "hidden"}">${p.text}</div>` +
      `<button class="play">▶</button>`;
    const txt = card.querySelector(".txt");
    txt.onclick = () => txt.classList.remove("hidden"); // tap to peek
    card.querySelector(".play").onclick = async () => {
      stop(); stopped = false; setActive(i); await readProblem(p.text); setActive(-1);
    };
    $("list").appendChild(card);
  });
  $("controls").hidden = groups.length === 0;
}

async function playAll() {
  stop(); stopped = false;
  const problems = curProblems();
  const gap = +$("gap").value * 1000;
  for (let i = 0; i < problems.length && !stopped; i++) {
    setActive(i);
    await readProblem(problems[i].text);
    if (i < problems.length - 1 && !stopped) await wait(gap);
  }
  setActive(-1);
}

// ---- image → resized base64 (cuts upload size + vision token cost) ----
async function fileToBase64(file, maxEdge = 1600) {
  const img = await createImageBitmap(file);
  const scale = Math.min(1, maxEdge / Math.max(img.width, img.height));
  const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
  const c = Object.assign(document.createElement("canvas"), { width: w, height: h });
  c.getContext("2d").drawImage(img, 0, 0, w, h);
  return c.toDataURL("image/jpeg", 0.85).split(",")[1];
}

$("pickBtn").onclick = () => $("file").click();
// ponytail: hash extracted groups to detect duplicates in saved sets.
function hashGroups(gs) {
  return gs.map(g => g.problems.map(p => p.text).sort().join("•")).sort().join("•");
}

$("file").onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  $("list").innerHTML = ""; $("tabs").innerHTML = ""; $("groupTitle").textContent = "";
  $("controls").hidden = true;
  $("pickBtn").disabled = true;
  const started = Date.now();
  const setBusy = (msg) =>
    ($("status").innerHTML = `<span class="spin"></span>${msg} (${Math.round((Date.now() - started) / 1000)}초)`);
  setBusy("사진을 준비하는 중…");
  const timer = setInterval(() => {
    if ($("status").querySelector(".spin"))
      setBusy("글자를 읽고 문제를 분류하는 중… 최대 30초 정도 걸려요");
  }, 1000);
  try {
    const image = await fileToBase64(file);
    setBusy("글자를 읽고 문제를 분류하는 중… 최대 30초 정도 걸려요");
    const r = await fetch("/api/extract", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ image, mediaType: "image/jpeg" }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || "인식 실패");
    const extracted = data.groups || [];
    const total = extracted.reduce((n, g) => n + g.problems.length, 0);
    if (total === 0) {
      $("status").textContent = "문제를 찾지 못했어요. 다시 찍어 주세요.";
      return;
    }
    // Check if extracted problems match any saved set.
    const sets = getSets();
    const extractedHash = hashGroups(extracted);
    const existingSet = sets.find(s => hashGroups(s.groups) === extractedHash);
    if (existingSet) {
      $("status").innerHTML = `<strong style="color:var(--signal)">⚠️ 이미 저장된 세트</strong> — "${existingSet.name}" 세트와 동일한 문제입니다. 불러올까요?<br/>`;
      const loadBtn = document.createElement("button");
      loadBtn.className = "btn-primary";
      loadBtn.textContent = "✓ 불러오기";
      loadBtn.style.marginTop = "8px";
      loadBtn.onclick = () => { groups = existingSet.groups; current = 0; render(); $("status").textContent = existingSet.name; };
      $("status").appendChild(loadBtn);
      return;
    }
    groups = extracted;
    current = 0;
    $("status").textContent = `${groups.length}개 급수 · 총 ${total}문제를 찾았어요.`;
    render();
  } catch (err) {
    $("status").textContent = "오류: " + err.message;
  } finally {
    clearInterval(timer);
    $("pickBtn").disabled = false;
    e.target.value = ""; // 같은 파일 다시 선택 가능하게
  }
};

$("rate").oninput = () => ($("rateV").textContent = $("rate").value + "x");
$("rep").oninput = () => ($("repV").textContent = $("rep").value + "회");
$("gap").oninput = () => ($("gapV").textContent = $("gap").value + "초");
$("reveal").onchange = render;
$("playAll").onclick = playAll;
$("stop").onclick = stop;

// ---- saved sets (localStorage) ----
const KEY = "dictation-sets";
const getSets = () => JSON.parse(localStorage.getItem(KEY) || "[]");
function renderSaved() {
  const sets = getSets();
  $("savedWrap").hidden = sets.length === 0;
  $("saved").innerHTML = "";
  sets.forEach((s) => {
    const count = s.groups.reduce((n, g) => n + g.problems.length, 0);
    const b = document.createElement("button");
    b.textContent = `${s.name} (${s.groups.length}급수 · ${count}문제)`;
    b.onclick = () => { groups = s.groups; current = 0; render(); $("status").textContent = s.name; };
    $("saved").appendChild(b);
  });
}
$("save").onclick = () => {
  if (!groups.length) return;
  const name = prompt("세트 이름", new Date().toLocaleDateString("ko-KR"));
  if (!name) return;
  const sets = getSets();
  sets.unshift({ name, groups });
  localStorage.setItem(KEY, JSON.stringify(sets.slice(0, 20)));
  renderSaved();
};
renderSaved();
</script>
</body>
</html>
